name: Sihirli Mobil Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js uyarısını gizler ve v24'e zorlar
  CI: false # Build sırasındaki önemsiz uyarıların işlemi durdurmasını engeller

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Repodaki Kodu Al
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Java Kurulumu (Android İçin)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Projeyi Yarat ve Derle
      run: |
        echo "1. Vite Projesi Oluşturuluyor..."
        npx --yes create-vite@latest dogacla-oyun --template react
        cd dogacla-oyun

        echo "2. Gerekli Paketler Yükleniyor..."
        npm install
        npm install lucide-react @capacitor/core @capacitor/android
        npm install -D tailwindcss postcss autoprefixer @capacitor/cli

        echo "3. Tailwind Ayarları Yapılıyor..."
        npx --yes tailwindcss init -p
        echo 'export default { content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"], theme: { extend: {} }, plugins: [], }' > tailwind.config.js
        echo '@tailwind base; @tailwind components; @tailwind utilities;' > src/index.css

        echo "4. Oyun Kodu Aktarılıyor..."
        if [ -f ../App.jsx ]; then
          cp ../App.jsx src/App.jsx
        elif ls ../*.jsx 1> /dev/null 2>&1; then
          # Eğer dosya ismi App.jsx değilse, ilk bulduğu jsx dosyasını App.jsx yapar
          find .. -maxdepth 1 -name "*.jsx" | head -n 1 | xargs -I {} cp {} src/App.jsx
        else
          echo "UYARI: Deponuzun ana dizininde bir .jsx dosyası bulunamadı! Lütfen kodu yüklediğinizden emin olun."
        fi

        echo "5. Capacitor Ayarlanıyor..."
        npx cap init "Dogacla" "com.oyun.dogacla" --web-dir dist || true

        echo "6. Web Uygulaması Derleniyor..."
        npm run build

        echo "7. Android Platformu Ekleniyor..."
        npx cap add android

        echo "8. APK Çıktısı Alınıyor..."
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: APK'yı Yükle ve Sun (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Dogacla-Oyun-APK
        path: dogacla-oyun/android/app/build/outputs/apk/debug/app-debug.apk
