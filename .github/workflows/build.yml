name: Sihirli Mobil Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Repodaki Kodu Al
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Java Kurulumu (Android İçin)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Projeyi Yarat ve Derle
      run: |
        set -e # Herhangi bir hatada anında dur ve log ver
        
        echo "1. Dosya Konumları Kontrol Ediliyor..."
        ls -la
        
        echo "2. Vite Projesi Oluşturuluyor..."
        npm create vite@latest dogacla-oyun -- --template react
        cd dogacla-oyun

        echo "3. Gerekli Paketler Yükleniyor..."
        npm install
        npm install lucide-react @capacitor/core @capacitor/android
        npm install -D tailwindcss postcss autoprefixer @capacitor/cli

        echo "4. Tailwind Ayarları Yapılıyor..."
        npx tailwindcss init -p
        echo 'export default { content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"], theme: { extend: {} }, plugins: [], }' > tailwind.config.js
        echo '@tailwind base; @tailwind components; @tailwind utilities;' > src/index.css

        echo "5. Oyun Kodu Aranıyor ve Aktarılıyor..."
        # Üst dizindeki tüm .jsx dosyalarını bulur ve ilk bulduğunu App.jsx olarak kopyalar
        JSX_FILE=$(find ../ -maxdepth 1 -iname "*.jsx" | head -n 1)
        if [ -z "$JSX_FILE" ]; then
          echo "Kritik Hata: GitHub ana dizininde hiçbir .jsx dosyası bulunamadı! Lütfen kodu yüklediğinizden emin olun."
          exit 1
        fi
        echo "Bulunan dosya: $JSX_FILE"
        cp "$JSX_FILE" src/App.jsx

        echo "6. Capacitor Ayarlanıyor..."
        npx cap init "Dogacla" "com.oyun.dogacla" --web-dir dist

        echo "7. Web Uygulaması Derleniyor..."
        npm run build

        echo "8. Android Platformu Ekleniyor..."
        npx cap add android

        echo "9. APK Çıktısı Alınıyor..."
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: APK'yı Yükle ve Sun (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Dogacla-Oyun-APK
        path: dogacla-oyun/android/app/build/outputs/apk/debug/app-debug.apk
