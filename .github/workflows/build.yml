name: Sihirli Mobil Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Repodaki Kodu Al
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Java Kurulumu (Android İçin)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Kesin Çözümlü Kurulum ve Derleme
      run: |
        set -e
        
        echo "1. Güvenli Klasörler Hazırlanıyor..."
        mkdir dogacla-mobil
        cd dogacla-mobil
        mkdir src
        
        echo "2. Konfigürasyon Dosyaları Manuel Oluşturuluyor..."
        cat << 'EOF' > package.json
        {
          "name": "dogacla-mobil",
          "private": true,
          "version": "1.0.0",
          "type": "module",
          "scripts": {
            "build": "vite build"
          },
          "dependencies": {
            "@capacitor/android": "^6.0.0",
            "@capacitor/core": "^6.0.0",
            "lucide-react": "^0.360.0",
            "react": "^18.2.0",
            "react-dom": "^18.2.0"
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@vitejs/plugin-react": "^4.2.1",
            "autoprefixer": "^10.4.16",
            "postcss": "^8.4.32",
            "tailwindcss": "^3.4.0",
            "vite": "^5.0.8"
          }
        }
        EOF
        
        cat << 'EOF' > vite.config.js
        import { defineConfig } from 'vite'
        import react from '@vitejs/plugin-react'
        export default defineConfig({ plugins: [react()] })
        EOF
        
        cat << 'EOF' > tailwind.config.js
        export default {
          content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"],
          theme: { extend: {} },
          plugins: [],
        }
        EOF
        
        cat << 'EOF' > postcss.config.js
        export default {
          plugins: { tailwindcss: {}, autoprefixer: {} }
        }
        EOF
        
        echo "3. Paketler Yükleniyor..."
        npm install
        
        echo "4. Temel React Bağlantıları Kuruluyor..."
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
            <title>Doğaçla Oyun</title>
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="/src/main.jsx"></script>
          </body>
        </html>
        EOF
        
        cat << 'EOF' > src/main.jsx
        import React from 'react'
        import ReactDOM from 'react-dom/client'
        import App from './App.jsx'
        import './index.css'
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
        EOF
        
        cat << 'EOF' > src/index.css
        @tailwind base;
        @tailwind components;
        @tailwind utilities;
        EOF
        
        echo "5. Oyun Kodun Aktarılıyor..."
        cp ../App.jsx src/App.jsx
        
        echo "6. Web Uygulaması Derleniyor..."
        npm run build
        
        echo "7. Capacitor & Android Hazırlığı..."
        npx cap init "Dogacla" "com.oyun.dogacla" --web-dir dist
        npx cap add android
        
        echo "8. APK Çıktısı Alınıyor..."
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: APK'yı Yükle ve Sun
      uses: actions/upload-artifact@v4
      with:
        name: Dogacla-Oyun-APK
        path: dogacla-mobil/android/app/build/outputs/apk/debug/app-debug.apk
