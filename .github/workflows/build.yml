name: DOĞAÇLA Mobil Build (Gömülü Videolarla)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Repodaki Kodu Al
      uses: actions/checkout@v4

    - name: Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Java Kurulumu (Android İçin)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 1. Ortam ve Paket Kurulumu
      run: |
        set -e
        mkdir dogacla-mobil
        cd dogacla-mobil
        mkdir src
        
        cat << 'EOF' > package.json
        {
          "name": "dogacla-mobil",
          "private": true,
          "version": "1.0.0",
          "type": "module",
          "scripts": { "build": "vite build" },
          "dependencies": {
            "@capacitor/android": "^6.0.0",
            "@capacitor/core": "^6.0.0",
            "firebase": "^10.8.1",
            "lucide-react": "^0.360.0",
            "react": "^18.2.0",
            "react-dom": "^18.2.0"
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@vitejs/plugin-react": "^4.2.1",
            "autoprefixer": "^10.4.16",
            "postcss": "^8.4.32",
            "tailwindcss": "^3.4.0",
            "vite": "^5.0.8"
          }
        }
        EOF
        
        cat << 'EOF' > vite.config.js
        import { defineConfig } from 'vite'
        import react from '@vitejs/plugin-react'
        export default defineConfig({ plugins: [react()] })
        EOF
        
        cat << 'EOF' > tailwind.config.js
        export default { content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"], theme: { extend: {} }, plugins: [], }
        EOF
        
        cat << 'EOF' > postcss.config.js
        export default { plugins: { tailwindcss: {}, autoprefixer: {} } }
        EOF
        
        npm install
        
        cat << 'EOF' > index.html
        <!DOCTYPE html>
        <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
            <title>DOĞAÇLA</title>
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="/src/main.jsx"></script>
          </body>
        </html>
        EOF
        
        cat << 'EOF' > src/main.jsx
        import React from 'react'
        import ReactDOM from 'react-dom/client'
        import App from './App.jsx'
        import './index.css'
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
        EOF
        
        cat << 'EOF' > src/index.css
        @tailwind base;
        @tailwind components;
        @tailwind utilities;
        EOF
        
        cp ../App.jsx src/App.jsx

    - name: 2. Videoları ve Görselleri İndirip Uygulamaya Göm
      run: |
        cd dogacla-mobil
        cat << 'EOF' > downloadAssets.mjs
        import fs from 'fs';
        import https from 'https';
        
        const path = './src/App.jsx';
        let code = fs.readFileSync(path, 'utf8');
        const urls = code.match(/https:\/\/raw\.githubusercontent\.com[^"']+/g) || [];
        const uniqueUrls = [...new Set(urls)];
        
        if (uniqueUrls.length > 0) {
            fs.mkdirSync('./public/assets', { recursive: true });
            
            async function downloadAll() {
                for (const url of uniqueUrls) {
                    const filename = decodeURIComponent(url.split('/').pop());
                    code = code.split(url).join('/assets/' + filename);
                    
                    console.log(`Indiriliyor: ${filename}...`);
                    await new Promise((resolve) => {
                        https.get(url, (res) => {
                            if (res.statusCode === 200) {
                                const file = fs.createWriteStream('./public/assets/' + filename);
                                res.pipe(file);
                                file.on('finish', () => { file.close(); resolve(); });
                            } else {
                                console.log(`Hata - İndirilemedi (404): ${filename}`);
                                resolve();
                            }
                        }).on('error', (e) => {
                            console.error(e);
                            resolve();
                        });
                    });
                }
                fs.writeFileSync(path, code);
                console.log('Tüm assetler indirildi ve React koduna gömüldü!');
            }
            await downloadAll();
        }
        EOF
        node downloadAssets.mjs
        rm downloadAssets.mjs

    - name: 3. Android Çıktısını Hazırla (APK)
      run: |
        cd dogacla-mobil
        npx cap init "Dogacla" "com.oyun.dogacla" --web-dir dist
        npm run build
        npx cap add android
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: APK'yı Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Dogacla-Oyun-APK
        path: dogacla-mobil/android/app/build/outputs/apk/debug/app-debug.apk
