name: Godot 4 Otomatik İndirme ve Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.1" # Kullanılacak Godot Sürümü
  PROJECT_NAME: "Dogacla"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 1. Kaynak Kodu Çek
        uses: actions/checkout@v4

      - name: 2. Java ve Android SDK Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Assetleri (Videolar ve Resimler) İnternetten İndir
        run: |
          mkdir -p assets
          cat << 'EOF' > download_assets.py
          import urllib.request
          import os

          # OYUNUN TÜM VİDEOLARI VE RESİMLERİ (FULL SÜRÜM)
          GAME_ASSETS = {
              "arkplan.png": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/arkplan.png",
              "dogacla_logsu.png": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/dogacla_logsu.png",
              "The_Clockwork_Caper.mp3": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/The_Clockwork_Caper.mp3",
              
              # İBİŞ VİDEOLARI
              "ibis_kolay.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/ibis_kolay.mp4",
              "ibis_orta.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/ibis_orta.mp4",
              "ibis_zor.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/ibis_zor.mp4",
              
              # KARAGÖZ VİDEOLARI
              "karagoz_kolay.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/karagoz_kolay.mp4",
              "karagoz_orta.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/karagoz_orta.mp4",
              "karagoz_zor.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/karagoz_zor.mp4",
              
              # SHAKESPEARE VİDEOLARI
              "shakespeare_kolay.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/shakespeare_kolay.mp4",
              "shakespeare_orta.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/shakespeare_orta.mp4",
              "shakespeare_zor.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/shakespeare_zor.mp4",
              
              # ARİSTOFANES VİDEOLARI
              "aristo_kolay.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/aristo_kolay.mp4",
              "artisto_bekleme.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/artisto_bekleme.mp4",
              "artisto_zor.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/artisto_zor.mp4",
              
              # FIRSAT/BONUS KARTI VİDEOLARI
              "madox_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/madox_karti.mp4",
              "dputiyat_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/dputiyat_karti.mp4",
              "Gulec_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/Gulec_karti.mp4",
              "kubi_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/kubi_karti.mp4",
              "kubo_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/kubo_karti.mp4",
              "Mali_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/Mali_karti.mp4",
              "sadic_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/sadic_karti.mp4",
              "tubi_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/tubi_karti.mp4",
              "cicu_karti.mp4": "https://raw.githubusercontent.com/dodoyedek1-bit/Dogacla-Oyunu/main/cicu_karti.mp4"
          }

          for filename, url in GAME_ASSETS.items():
              try:
                  print(f"İndiriliyor: {filename}...")
                  urllib.request.urlretrieve(url, f"assets/{filename}")
              except Exception as e:
                  print(f"HATA: {filename} indirilemedi! ({e})")
          
          print("Tüm medyalar 'assets' klasörüne başarıyla indirildi!")
          EOF
          python3 download_assets.py

      - name: 4. Godot Engine Headless Kurulumu
        run: |
          echo "Godot ${GODOT_VERSION} indiriliyor..."
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: 5. Android Export Şablonlarını Yükle
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          mv ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          rm -rf ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/templates

      - name: 6. Debug Keystore Oluştur ve Godot'ya Tanıt
        run: |
          # İmza dosyasını oluştur
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999
          
          # Godot'ya Android SDK ve İmza yollarını zorla öğret (BU KISIM EKSİKTİ)
          mkdir -p ~/.config/godot
          cat << EOF > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          EOF

      - name: 7. Godot Headless Import (İndirilen Medyaları Algılama)
        run: |
          echo "Godot, assets klasöründeki yeni indirilen videoları ve görselleri algılayıp .import dosyalarını oluşturuyor..."
          godot --headless -v --editor --quit || true

      - name: 8. APK'yı Export Et (Paketle)
        run: |
          mkdir -p build/android
          echo "Android APK dışa aktarılıyor..."
          # Değişkeni kaldırıp direkt adını yazdık, ayrıca hataları görebilmek için -v ekledik
          godot --headless -v --export-debug "Android" build/android/Dogacla.apk
          
          echo "==== APK KLASÖRÜ KONTROLÜ ===="
          ls -la build/android/

      - name: 9. APK'yı İndirmeye Hazır Hale Getir (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Dogacla-Godot-APK
          path: build/android/Dogacla.apk # Burada da değişkeni sildik
